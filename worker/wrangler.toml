name = "qimen"
main = "src/index.js"
compatibility_date = "2026-05-13"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[secrets]
required = [
  "GEMINI_API_KEY",
  "SUPABASE_SERVICE_KEY"
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
