name = "qimen"
main = "src/index.js"
compatibility_date = "2026-05-13"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[vars]
FRONTEND_URL = "https://qimendao.com,https://www.qimendao.com"
SUPABASE_URL = "https://xkbqiiwwgfzkyfhxuoev.supabase.co"
WHITELIST_EMAILS = "linjunyan0726@vip.qq.com,blairzbz1112@gmail.com,caoyuwei819@163.com,joneykovic@gmail.com,chenxinhui1227@gmail.com,anyilin1997@qq.com,hateveryone@foxmail.com"
# 问事(qimen/bazi 问答) LLM 模型；评测显示 flash 在复杂格局不弱于 pro，production 切 flash
# env 开关保留：如需回退 pro，改此值即可（preview 同样可独立覆盖）
QUESTION_MODEL = "gemini-3-flash-preview"
# Langfuse trace 上报 base URL（JP 区域）
LANGFUSE_BASE_URL = "https://jp.cloud.langfuse.com"

[secrets]
required = [
  "GEMINI_API_KEY",
  "SUPABASE_SERVICE_KEY",
  "LANGFUSE_PUBLIC_KEY",
  "LANGFUSE_SECRET_KEY"
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[env.preview]
name = "qimen-preview"
workers_dev = true

[env.preview.vars]
FRONTEND_URL = "https://qimen-1ff.pages.dev"
SUPABASE_URL = "https://xkbqiiwwgfzkyfhxuoev.supabase.co"
WHITELIST_EMAILS = "linjunyan0726@vip.qq.com,blairzbz1112@gmail.com,caoyuwei819@163.com,joneykovic@gmail.com,chenxinhui1227@gmail.com,anyilin1997@qq.com,hateveryone@foxmail.com"
# preview 试用 flash，对比 pro 的稳定性与质量
QUESTION_MODEL = "gemini-3-flash-preview"
LANGFUSE_BASE_URL = "https://jp.cloud.langfuse.com"

[env.preview.secrets]
required = [
  "GEMINI_API_KEY",
  "SUPABASE_SERVICE_KEY",
  "LANGFUSE_PUBLIC_KEY",
  "LANGFUSE_SECRET_KEY"
]
