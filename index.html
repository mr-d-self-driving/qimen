<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奇门遁甲 AI 决策引擎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ═══════════════════════════════════════════
           CSS 变量 & 全局重置
        ═══════════════════════════════════════════ */
        :root {
            --gold-bright:   #E8CC80;
            --gold-mid:      #B38B36;
            --gold-dim:      rgba(179,139,54,0.18);
            --gold-glow:     rgba(230,194,122,0.12);
            --bg-deep:       #050508;
            --bg-card:       #0e0e13;
            --bg-item:       #161620;
            --border-subtle: rgba(255,255,255,0.06);
            --text-primary:  #F0EDE6;
            --text-muted:    #6E6E7A;
            --text-dim:      #3A3A45;
            --radius-card:   22px;
            --radius-item:   12px;
            --font-serif:    'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            --font-body:     'PingFang SC', -apple-system, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════
           星空画布背景
        ═══════════════════════════════════════════ */
        #cosmosCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════
           布局容器
        ═══════════════════════════════════════════ */
        .page-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        /* ═══════════════════════════════════════════
           顶部标题区 & 用户信息
        ═══════════════════════════════════════════ */
        .header-section {
            text-align: center;
            margin-bottom: 32px;
            animation: riseIn 1s cubic-bezier(0.22,1,0.36,1) both;
        }

        /* 八卦旋转环 */
        .bagua-ring {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 18px;
        }
        .bagua-ring .ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(179,139,54,0.3);
            animation: spinSlow 24s linear infinite;
        }
        .bagua-ring .ring-inner {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1px solid rgba(179,139,54,0.15);
            animation: spinSlow 16s linear infinite reverse;
        }
        .bagua-ring .trigrams {
            position: absolute;
            inset: 0;
            animation: spinSlow 24s linear infinite;
        }
        .bagua-ring .trigrams span {
            position: absolute;
            font-size: 11px;
            color: var(--gold-mid);
            opacity: 0.7;
            transform-origin: 45px 45px;
            width: 14px;
            text-align: center;
            left: 38px;
            top: 2px;
        }
        .bagua-ring .center-eye {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-family: var(--font-serif);
            color: var(--gold-bright);
            filter: drop-shadow(0 0 10px rgba(230,194,122,0.5));
            animation: breathe 4s ease-in-out infinite;
        }

        .header-title {
            font-family: var(--font-serif);
            font-size: 28px;
            letter-spacing: 6px;
            font-weight: 400;
            background: linear-gradient(160deg, #F2E0A0 0%, #B38B36 50%, #E8CC80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(179,139,54,0.2));
        }
        .header-sub {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 用户状态栏 */
        .user-greeting {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.8s ease;
        }
        .logout-btn {
            color: var(--gold-mid);
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-size: 11px;
            padding: 0;
            letter-spacing: 1px;
        }
        .logout-btn:hover { color: var(--gold-bright); }

        /* ═══════════════════════════════════════════
           通用质感卡片容器 (Input / Auth / History)
        ═══════════════════════════════════════════ */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-card);
            border: 1px solid rgba(179,139,54,0.2);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow:
                0 0 0 1px rgba(179,139,54,0.05),
                0 20px 50px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.04);
            animation: riseIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .input-box::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(179,139,54,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .field-label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: -4px;
        }

        input[type="email"], input[type="password"], textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-item);
            padding: 13px 16px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            line-height: 1.6;
        }
        textarea { resize: none; min-height: 90px; }
        input::placeholder, textarea::placeholder { color: var(--text-dim); }
        input:focus, textarea:focus {
            border-color: rgba(179,139,54,0.5);
            background: rgba(179,139,54,0.04);
            box-shadow: 0 0 0 3px rgba(179,139,54,0.08), inset 0 1px 0 rgba(179,139,54,0.05);
        }

        /* 登录/注册切换 */
        .auth-switch {
            text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 4px; cursor: pointer; letter-spacing: 1px;
        }
        .auth-switch span { color: var(--gold-mid); text-decoration: underline; }

        /* 历史记录列表 */
        .history-list {
            display: flex; flex-direction: column; gap: 12px; max-height: 280px; overflow-y: auto; padding-right: 4px;
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(179,139,54,0.3); border-radius: 4px; }
        
        .history-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px 16px;
            border-radius: var(--radius-item);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .history-item:hover {
            border-color: rgba(179,139,54,0.4);
            background: rgba(179,139,54,0.06);
            transform: translateX(4px);
        }
        .hi-title {
            font-size: 14px; color: var(--text-primary); margin-bottom: 6px; line-height: 1.5; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .hi-date { font-size: 11px; color: var(--gold-mid); opacity: 0.8;}

        /* 模块显示控制 */
        #authSection, #appSection { display: none; width: 100%; }

        /* 提交按钮 */
        .submit-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #E8CC80 0%, #B38B36 50%, #C9A052 100%);
            color: #0a0800;
            border: none;
            border-radius: var(--radius-item);
            padding: 16px;
            font-size: 15px;
            font-family: var(--font-serif);
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, opacity 0.25s;
            box-shadow: 0 4px 20px rgba(179,139,54,0.3), 0 1px 0 rgba(255,255,255,0.15) inset;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(179,139,54,0.45); }
        .submit-btn:hover::after { transform: translateX(100%); transition: transform 0.6s ease; }
        .submit-btn:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(179,139,54,0.3); }
        .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        /* 按钮内旋转图标 */
        .btn-icon { display: inline-block; margin-right: 6px; transition: transform 0.4s; }
        .submit-btn:not(:disabled):hover .btn-icon { transform: rotate(180deg); }

        /* ═══════════════════════════════════════════
           加载动画
        ═══════════════════════════════════════════ */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 0 30px;
            animation: fadeIn 0.5s ease;
        }

        .loader-bagua {
            position: relative;
            width: 60px;
            height: 60px;
        }
        .loader-bagua .lb-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }
        .lb-ring-1 {
            border-top-color: var(--gold-bright);
            border-right-color: rgba(230,194,122,0.3);
            animation: spin 1.4s ease-in-out infinite;
        }
        .lb-ring-2 {
            inset: 8px;
            border-top-color: rgba(230,194,122,0.5);
            border-left-color: rgba(230,194,122,0.2);
            animation: spin 1.0s ease-in-out infinite reverse;
        }
        .lb-ring-3 {
            inset: 16px;
            border-top-color: rgba(230,194,122,0.7);
            animation: spin 0.7s linear infinite;
        }
        .lb-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            animation: breathe 2s ease-in-out infinite;
        }

        .loader-steps {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .loader-text {
            font-size: 13px;
            color: var(--gold-mid);
            letter-spacing: 1px;
        }
        .loader-dots {
            display: flex;
            gap: 6px;
        }
        .loader-dots span {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold-mid);
            opacity: 0.3;
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* ═══════════════════════════════════════════
           结果卡片
        ═══════════════════════════════════════════ */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 26px 20px;
            display: none;
            margin-bottom: 40px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(179,139,54,0.08);
            animation: riseIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
            position: relative;
            overflow: hidden;
        }

        /* 顶部光带装饰 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--theme-color, #B38B36), transparent);
            opacity: 0.6;
        }
        /* 底部右侧暗纹装饰 */
        .card::after {
            content: '☰';
            position: absolute;
            bottom: -20px; right: -10px;
            font-size: 120px;
            color: rgba(255,255,255,0.02);
            pointer-events: none;
            font-family: serif;
            line-height: 1;
        }

        /* 卡头 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .title {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .score-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .score {
            background: var(--theme-color-dim, rgba(179,139,54,0.15));
            color: var(--theme-color, #B38B36);
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 1px;
            border: 1px solid color-mix(in srgb, var(--theme-color, #B38B36) 30%, transparent);
            box-shadow: 0 0 16px var(--theme-color-dim, rgba(179,139,54,0.15)), 0 0 4px var(--theme-color-dim, rgba(179,139,54,0.1)) inset;
            animation: glowPulse 3s ease-in-out infinite;
        }
        .score-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; }

        .conclusion {
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 400;
            color: var(--theme-color, #E8CC80);
            margin-bottom: 8px;
            line-height: 1.3;
            letter-spacing: 1px;
            text-shadow: 0 0 30px color-mix(in srgb, var(--theme-color, #B38B36) 40%, transparent);
        }
        .keyword {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        .user-question {
            font-size: 14px;
            color: rgba(240,237,230,0.8);
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-item);
            border-left: 3px solid var(--theme-color, #B38B36);
            margin-bottom: 24px;
            font-style: italic;
            line-height: 1.7;
            position: relative;
        }
        .user-question::before {
            content: '"';
            position: absolute;
            top: -8px; left: 10px;
            font-size: 40px;
            font-family: Georgia, serif;
            color: var(--theme-color, #B38B36);
            opacity: 0.3;
            line-height: 1;
        }

        /* 分区标题 */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin: 28px 0 14px;
            position: relative;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        }
        .section-title .icon { font-size: 15px; opacity: 0.9; }

        /* ═══════════════════════════════════════════
           信息网格
        ═══════════════════════════════════════════ */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-item {
            background: var(--bg-item);
            border: 1px solid var(--border-subtle);
            padding: 14px;
            border-radius: var(--radius-item);
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
        }
        .grid-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        }
        .grid-item:hover {
            border-color: rgba(179,139,54,0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .label {
            font-size: 10px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 7px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .value {
            font-size: 13px;
            font-weight: 400;
            color: #DDDDE5;
            line-height: 1.6;
        }

        /* 特殊格 */
        .bazi-insight {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, color-mix(in srgb, var(--theme-color, #B38B36) 8%, transparent), transparent);
            border-left: 2px solid var(--theme-color, #B38B36);
        }
        .bazi-insight .label { color: var(--theme-color, #B38B36); }

        .dynamic-timing {
            grid-column: 1 / -1;
            background: rgba(245,197,24,0.04);
            border-left: 2px solid #F5C518;
        }
        .dynamic-timing .label { color: #F5C518; }

        .score-basis {
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.02);
        }
        .score-basis .label { color: var(--text-muted); }
        .score-basis-body { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
        .sb-row { display: flex; flex-direction: column; gap: 6px; }
        .sb-row-title { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
        .sb-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .sb-tag {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            line-height: 1.5;
            transition: transform 0.2s;
        }
        .sb-tag:hover { transform: scale(1.05); }
        .sb-tag.positive { background: rgba(0,210,106,0.1); color: #00D26A; border: 1px solid rgba(0,210,106,0.2); }
        .sb-tag.negative { background: rgba(255,94,87,0.1); color: #FF5E57; border: 1px solid rgba(255,94,87,0.2); }
        .sb-logic {
            font-size: 12px;
            color: #9090A0;
            line-height: 1.7;
            padding: 10px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            border-left: 2px solid var(--theme-color, #B38B36);
        }

        /* ═══════════════════════════════════════════
           策略列表 & 避坑
        ═══════════════════════════════════════════ */
        .strategy-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .strategy-list li {
            position: relative;
            padding: 12px 14px 12px 36px;
            background: var(--bg-item);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: #CCCCD8;
            font-size: 13.5px;
            line-height: 1.65;
            transition: border-color 0.25s, background 0.25s;
        }
        .strategy-list li:hover {
            border-color: rgba(179,139,54,0.2);
            background: rgba(179,139,54,0.04);
        }
        .strategy-list li::before {
            content: "✦";
            position: absolute;
            left: 14px;
            top: 13px;
            color: var(--theme-color, #B38B36);
            font-size: 11px;
        }

        .risk-alert {
            background: rgba(255,94,87,0.06);
            border: 1px solid rgba(255,94,87,0.15);
            border-left: 3px solid #FF5E57;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 14px;
        }
        .risk-alert-title {
            color: #FF5E57;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .risk-alert-content { color: #D0D0D8; font-size: 13px; line-height: 1.65; }

        /* ═══════════════════════════════════════════
           底部锦囊
        ═══════════════════════════════════════════ */
        .footer {
            display: flex;
            gap: 8px;
            background: linear-gradient(135deg, rgba(179,139,54,0.1), rgba(179,139,54,0.05));
            border: 1px solid rgba(179,139,54,0.2);
            padding: 16px 12px;
            border-radius: 16px;
            margin-top: 28px;
        }
        .f-item {
            flex: 1;
            text-align: center;
            padding: 4px 0;
            border-right: 1px solid rgba(255,255,255,0.04);
        }
        .f-item:last-child { border-right: none; }
        .f-icon {
            display: block;
            font-size: 22px;
            margin-bottom: 6px;
            animation: floatIcon 3s ease-in-out infinite;
        }
        .f-item:nth-child(2) .f-icon { animation-delay: 0.5s; }
        .f-item:nth-child(3) .f-icon { animation-delay: 1s; }
        .f-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--theme-color, #E8CC80);
            letter-spacing: 0.5px;
        }

        /* ═══════════════════════════════════════════
           九宫格排盘
        ═══════════════════════════════════════════ */
        .pan-wrapper {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(179,139,54,0.15);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        .pan-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(179,139,54,0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .pan-header { text-align: center; margin-bottom: 14px; }
        .pan-pillars {
            font-family: var(--font-serif);
            font-size: 17px;
            font-weight: 400;
            color: #FFF;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .pan-info { font-size: 11px; color: #888; line-height: 1.7; }
        .pan-info b { color: var(--theme-color, #B38B36); font-weight: 600; }

        .pan-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .pan-cell {
            background: var(--bg-card);
            aspect-ratio: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .pan-cell:hover { background: rgba(255,255,255,0.03); }

        .pan-center-earth { font-size: 32px; font-weight: 900; color: var(--text-dim); }
        .pan-god { position: absolute; top: 6px; font-size: 9px; color: #666; letter-spacing: 1px; }
        .pan-star { font-size: 12px; color: #CCC; margin-bottom: 2px; z-index: 2; }
        .pan-door { font-size: 15px; font-weight: 700; color: #FFF; z-index: 2; letter-spacing: 1px; font-family: var(--font-serif); }
        .pan-stem { position: absolute; font-size: 11px; font-weight: 600; }
        .stem-sky { top: 6px; left: 7px; color: #E0E0E8; }
        .stem-earth { bottom: 6px; right: 7px; color: #777; }
        .ji-sky { top: 20px; left: 7px; font-size: 9px; color: #555; }
        .ji-earth { bottom: 20px; right: 7px; font-size: 9px; color: #555; }
        .pan-marks { position: absolute; bottom: 5px; left: 5px; display: flex; gap: 3px; z-index: 3; }
        .pan-mark { font-size: 9px; padding: 1px 4px; border-radius: 4px; font-weight: 700; }
        .mark-ma { background: var(--theme-color, #B38B36); color: #000; }
        .mark-kong { border: 1px solid #555; color: #888; background: rgba(0,0,0,0.4); }

        .highlight-text {
            color: var(--theme-color, #E8CC80) !important;
            text-shadow: 0 0 12px color-mix(in srgb, var(--theme-color, #B38B36) 50%, transparent);
        }

        /* ═══════════════════════════════════════════
           分隔装饰线
        ═══════════════════════════════════════════ */
        .ornament-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0;
            opacity: 0.3;
        }
        .ornament-divider::before, .ornament-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(179,139,54,0.5), transparent);
        }
        .ornament-divider span { font-size: 10px; color: var(--gold-mid); }

        /* ═══════════════════════════════════════════
           滚动进入动画 (JS 控制 class)
        ═══════════════════════════════════════════ */
        .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .reveal.visible { opacity: 1; transform: none; }

        /* ═══════════════════════════════════════════
           关键帧
        ═══════════════════════════════════════════ */
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes spinSlow {
            100% { transform: rotate(360deg); }
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 8px rgba(230,194,122,0.3)); }
            50%       { opacity: 1;   filter: drop-shadow(0 0 18px rgba(230,194,122,0.6)); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 12px var(--theme-color-dim, rgba(179,139,54,0.15)); }
            50%       { box-shadow: 0 0 24px var(--theme-color-dim, rgba(179,139,54,0.3)), 0 0 8px var(--theme-color-dim, rgba(179,139,54,0.1)) inset; }
        }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40%            { opacity: 1;   transform: scale(1.2); }
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-4px); }
        }

        /* ═══════════════════════════════════════════
           响应式微调
        ═══════════════════════════════════════════ */
        @media (max-width: 400px) {
            .header-title { font-size: 24px; letter-spacing: 4px; }
            .conclusion { font-size: 22px; }
        }
    </style>

<body>

<script>
/* ═══════════════════════════════════════════════
   星空粒子背景与八卦阵逻辑 (保持原样不动)
═══════════════════════════════════════════════ */
(function() {
    const canvas = document.getElementById('cosmosCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        const count = Math.floor((W * H) / 5000);
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * W, y: Math.random() * H, r: Math.random() * 0.9 + 0.2, a: Math.random(),
                speed: (Math.random() * 0.3 + 0.05) * (Math.random() > 0.5 ? 1 : -1), drift: (Math.random() - 0.5) * 0.1,
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
            s.a += s.speed * 0.008; s.x += s.drift;
            if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
            const alpha = (Math.sin(s.a) + 1) / 2;
            ctx.save();
            ctx.globalAlpha = alpha * 0.5 + 0.05; ctx.fillStyle = '#E8CC80';
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });
        for (let i = 0; i < stars.length; i++) {
            for (let j = i + 1; j < stars.length; j++) {
                const dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    ctx.save();
                    ctx.globalAlpha = (1 - dist / 100) * 0.04; ctx.strokeStyle = '#B38B36'; ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(stars[i].x, stars[i].y); ctx.lineTo(stars[j].x, stars[j].y); ctx.stroke();
                    ctx.restore();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    resize(); initStars(); draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
})();

(function() {
    const ring = document.getElementById('trigramRing');
    const symbols = ['☰','☱','☲','☳','☴','☵','☶','☷'];
    symbols.forEach((sym, i) => {
        const span = document.createElement('span');
        span.textContent = sym;
        const angle = (i / symbols.length) * 360;
        span.style.transform = `rotate(${angle}deg) translateY(0px)`;
        ring.appendChild(span);
    });
})();

const loaderMessages = ['正在接通云端超算矩阵...', '推演时空坐标与节气数据...', '计算奇门九宫落盘...', '分析值符、值使与神助...', '生成决策指引与应期推演...'];
let loaderMsgIdx = 0, loaderInterval = null;
function startLoaderCycle() {
    loaderMsgIdx = 0; document.getElementById('loaderText').textContent = loaderMessages[0];
    loaderInterval = setInterval(() => {
        loaderMsgIdx = (loaderMsgIdx + 1) % loaderMessages.length;
        const el = document.getElementById('loaderText');
        el.style.opacity = 0;
        setTimeout(() => {
            el.textContent = loaderMessages[loaderMsgIdx]; el.style.transition = 'opacity 0.4s'; el.style.opacity = 1;
        }, 300);
    }, 2200);
}
function stopLoaderCycle() { clearInterval(loaderInterval); }

/* ═══════════════════════════════════════════════
   Supabase 账号认证体系与数据库交互
═══════════════════════════════════════════════ */
// ⚠️ 必填：请在此处填入你在 Supabase 获取的 URL 和 ANON_KEY
const SUPABASE_URL = 'https://xkbqiiwwgfzkyfhxuoev.supabase.co'; 
const SUPABASE_ANON_KEY = 'sb_publishable_qr9YBIA6n32r-mcqKbkpgA_0XVTUSI7';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const API_URL = "/api/qimen"; 

let isLoginMode = true;
let currentUser = null;

// 页面加载检查登录态
window.onload = async () => {
    const { data: { session } } = await supabase.auth.getSession();
    updateUIForSession(session);
    supabase.auth.onAuthStateChange((_event, session) => updateUIForSession(session));
};

function updateUIForSession(session) {
    const authSec = document.getElementById('authSection');
    const appSec = document.getElementById('appSection');
    const greet = document.getElementById('userGreeting');
    
    if (session) {
        currentUser = session.user;
        authSec.style.display = 'none';
        appSec.style.display = 'block';
        greet.style.display = 'flex';
        document.getElementById('userEmailTxt').innerText = `已登录: ${currentUser.email}`;
        loadHistory(); // 登录后拉取历史
    } else {
        currentUser = null;
        authSec.style.display = 'flex';
        appSec.style.display = 'none';
        greet.style.display = 'none';
        document.getElementById("resultContainer").innerHTML = "";
    }
}

// 切换登录/注册 UI
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('authTitleLabel').innerText = isLoginMode ? '身份认证 (登录)' : '创建账号 (注册)';
    document.getElementById('authBtnText').innerText = isLoginMode ? '登 录' : '注 册';
    document.querySelector('.auth-switch').innerHTML = isLoginMode ? '没有账号？ <span>点击注册</span>' : '已有账号？ <span>点击登录</span>';
}

// 执行登录或注册
async function handleAuth() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const btnText = document.getElementById('authBtnText');
    const btn = document.getElementById('authBtn');

    if (!email || !password) return alert("请填写完整的邮箱和密码");
    
    btn.disabled = true; btnText.innerText = '验证中...';

    try {
        if (isLoginMode) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
        } else {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            alert("注册成功！(如果系统未自动登录，请去邮箱点击验证链接)");
        }
    } catch (error) {
        alert("认证失败: " + error.message);
    } finally {
        btn.disabled = false; btnText.innerText = isLoginMode ? '登 录' : '注 册';
    }
}

async function handleSignOut() { await supabase.auth.signOut(); }

/* ═══════════════════════════════════════════════
   起局推演与数据库交互
═══════════════════════════════════════════════ */
async function startDivination() {
    const input = document.getElementById("questionInput").value.trim();
    const btn = document.getElementById("submitBtn");
    const loader = document.getElementById("loader");
    const rc = document.getElementById("resultContainer");

    if (!input) return alert("问题不能为空哦！");

    btn.disabled = true; document.getElementById("questionInput").disabled = true;
    btn.innerHTML = '<span class="btn-icon" style="animation:spin 1s linear infinite;display:inline-block">☯</span>推演中…';
    rc.innerHTML = ""; loader.style.display = "flex"; startLoaderCycle();

    try {
        // 请求 Vercel 接口 (无需传口令了)
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: input })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.details || data.error);

        // 存入 Supabase 数据库
        await saveRecordToDatabase(input, data);

        // 渲染卡片
        rc.innerHTML = buildCardHTML(data);
        animateScore(data.summary?.score || 0);
        setTimeout(() => {
            rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('.reveal').forEach((el, i) => setTimeout(() => el.classList.add('visible'), i * 80));
        }, 100);

    } catch (err) {
        console.error(err); alert("云端推演失败：\n" + err.message);
    } finally {
        stopLoaderCycle();
        btn.disabled = false; document.getElementById("questionInput").disabled = false;
        btn.innerHTML = '<span class="btn-icon">☯</span>洞察天机';
        loader.style.display = "none";
    }
}

// 保存至数据库
async function saveRecordToDatabase(question, jsonResult) {
    if (!currentUser) return;
    const { error } = await supabase.from('qimen_records').insert([{ user_id: currentUser.id, question: question, qimen_data: jsonResult }]);
    if (error) console.error("保存历史记录失败:", error);
    else loadHistory();
}

// 拉取历史记录
async function loadHistory() {
    if (!currentUser) return;
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');

    const { data, error } = await supabase
        .from('qimen_records')
        .select('id, question, qimen_data, created_at')
        .order('created_at', { ascending: false });

    if (error || !data || data.length === 0) {
        historyPanel.style.display = 'none'; return;
    }

    historyPanel.style.display = 'flex';
    historyList.innerHTML = '';

    data.forEach(record => {
        const dateObj = new Date(record.created_at);
        const dateStr = `${dateObj.getMonth()+1}月${dateObj.getDate()}日 ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
        const title = record.qimen_data?.summary?.title || "未知预测";

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<div class="hi-title">${title} - ${record.question}</div><div class="hi-date">${dateStr}</div>`;
        item.onclick = () => {
            document.getElementById("resultContainer").innerHTML = buildCardHTML(record.qimen_data);
            animateScore(record.qimen_data?.summary?.score || 0);
            document.getElementById("resultContainer").scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('.reveal').forEach((el, i) => setTimeout(() => el.classList.add('visible'), i * 80));
        };
        historyList.appendChild(item);
    });
}

function animateScore(target) {
    const el = document.getElementById('scoreValue');
    if (!el) return;
    let cur = 0, step = Math.ceil(target / 30);
    const timer = setInterval(() => { cur = Math.min(cur + step, target); el.textContent = cur + ' 分'; if (cur >= target) clearInterval(timer); }, 35);
}

/* ═══════════════════════════════════════════════
   卡片 HTML 组装逻辑 (一模一样保留，适配全新样式)
═══════════════════════════════════════════════ */
function buildCardHTML(data) {
    const summary    = data.summary    || { title: "生成中...", conclusion: "暂无数据", score: 0 };
    const analysis   = data.analysis   || {};
    const advice     = data.advice     || { lucky_tips: {} };
    const question   = data.question   || "";
    const scoreBasis = data.summary?.score_basis || null;
    const chartData  = data.qimen_data || data;
    const palaces    = chartData.palaces || [];
    const pillars    = chartData.pillars || {};
    const ju         = chartData.ju_info || {};
    const ts         = chartData.timestamp || {};
    const hasChart   = palaces.length > 0;

    const score = summary.score || 0;
    const THEME  = score < 60 ? "#FF5E57" : score < 80 ? "#F5C518" : "#00D26A";
    const THEME_DIM = score < 60 ? "rgba(255,94,87,0.15)" : score < 80 ? "rgba(245,197,24,0.15)" : "rgba(0,210,106,0.15)";

    const strategies = (advice.strategy || []).map((s, i) => `<li class="reveal" style="transition-delay:${i * 60}ms">${s}</li>`).join('');
    let riskHTML = '';
    if (advice.risk?.trim()) riskHTML = `<div class="risk-alert reveal"><div class="risk-alert-title"><span>⚠️</span>避坑指南</div><div class="risk-alert-content">${advice.risk}</div></div>`;
    let baziHTML = '';
    if (analysis.bazi_insight?.trim() && !analysis.bazi_insight.includes("未提供八字信息")) baziHTML = `<div class="grid-item bazi-insight reveal"><span class="label">🧬 命理 / 年命参考</span><span class="value">${analysis.bazi_insight}</span></div>`;
    
    let scoreBasisHTML = '';
    if (scoreBasis) {
        const pos = (scoreBasis.positive_signals || []).length ? `<div class="sb-row"><div class="sb-row-title">✅ 吉象支撑</div><div class="sb-tags">${scoreBasis.positive_signals.map(s=>`<span class="sb-tag positive">${s}</span>`).join('')}</div></div>` : '';
        const neg = (scoreBasis.negative_signals || []).length ? `<div class="sb-row"><div class="sb-row-title">⚠️ 风险信号</div><div class="sb-tags">${scoreBasis.negative_signals.map(s=>`<span class="sb-tag negative">${s}</span>`).join('')}</div></div>` : '';
        const logic = scoreBasis.score_logic ? `<div class="sb-logic">${scoreBasis.score_logic}</div>` : '';
        if (pos || neg || logic) scoreBasisHTML = `<div class="grid-item score-basis reveal"><span class="label">⚖️ 评分依据</span><div class="score-basis-body">${pos}${neg}${logic}</div></div>`;
    }

    let timingHTML = '';
    if (analysis.dynamic_timing?.trim()) timingHTML = `<div class="grid-item dynamic-timing reveal"><span class="label">⏳ 动态应期（转机推演）</span><span class="value">${analysis.dynamic_timing}</span></div>`;

    let chartHTML = '';
    if (hasChart) {
        const isZhiFu  = s => s && ju.zhi_fu  && s.includes(ju.zhi_fu);
        const isZhiShi = d => d && ju.zhi_shi && d.includes(ju.zhi_shi);
        const cells = palaces.map(p => {
            if (p.is_center) return `<div class="pan-cell"><div class="pan-center-earth">${p.earth || ''}</div></div>`;
            const starCls = isZhiFu(p.star)  ? 'highlight-text' : '';
            const doorCls = isZhiShi(p.door) ? 'highlight-text' : '';
            let marks = '';
            if (p.ma_xing?.has_ma) marks += `<span class="pan-mark mark-ma">马</span>`;
            if (p.kong_wang?.is_kong) marks += `<span class="pan-mark mark-kong">空</span>`;
            return `<div class="pan-cell"><div class="pan-god">${p.god||''}</div><div class="pan-stem stem-sky">${p.sky||''}</div>${p.ji_sky ? `<div class="pan-stem ji-sky">${p.ji_sky}</div>` : ''}<div class="pan-star ${starCls}">${p.star||''}</div><div class="pan-door ${doorCls}">${p.door||''}</div><div class="pan-stem stem-earth">${p.earth||''}</div>${p.ji_earth ? `<div class="pan-stem ji-earth">${p.ji_earth}</div>` : ''}<div class="pan-marks">${marks}</div></div>`;
        }).join('');
        chartHTML = `<div class="section-title reveal"><span class="icon">🧭</span>奇门排盘</div><div class="pan-wrapper reveal"><div class="pan-header"><div class="pan-pillars">${[pillars.year, pillars.month, pillars.day, pillars.hour].filter(Boolean).join('　')}</div><div class="pan-info">${ts.solar || ''} | ${ju.name || ''} · ${ju.jieqi || ''}<br>值符：<b>${ju.zhi_fu||'-'}</b>&emsp;值使：<b>${ju.zhi_shi||'-'}</b></div></div><div class="pan-grid">${cells}</div></div>`;
    }

    const questionHTML = question ? `<div class="user-question reveal">${question}</div>` : '';

    return `
    <div class="card" style="display:block; --theme-color:${THEME}; --theme-color-dim:${THEME_DIM};">
        <div class="card-header reveal">
            <div><div class="title">${summary.title}</div></div>
            <div class="score-badge"><div class="score" id="scoreValue">${score} 分</div><div class="score-label">吉凶评分</div></div>
        </div>
        <div class="conclusion reveal">${summary.conclusion}</div>
        <div class="keyword reveal">🔑 ${summary.keyword}</div>
        ${questionHTML}
        <div class="ornament-divider reveal"><span>☰</span></div>
        ${chartHTML}
        <div class="section-title reveal"><span class="icon">🔍</span>深度局象</div>
        <div class="info-grid">
            ${baziHTML}${scoreBasisHTML}${timingHTML}
            <div class="grid-item reveal"><span class="label">🌌 时空能量</span><span class="value">${analysis.tensor||'-'}</span></div>
            <div class="grid-item reveal"><span class="label">👤 用神分析</span><span class="value">${analysis.yong_shen||'-'}</span></div>
            <div class="grid-item reveal"><span class="label">🔮 特殊格局</span><span class="value">${analysis.pattern||'-'}</span></div>
            <div class="grid-item reveal"><span class="label">🙏 神助指引</span><span class="value">${analysis.god_help||'-'}</span></div>
        </div>
        <div class="section-title reveal"><span class="icon">💡</span>决策指引</div>
        <ul class="strategy-list">${strategies}</ul>
        ${riskHTML}
        <div class="ornament-divider reveal"><span>☷</span></div>
        <div class="footer reveal">
            <div class="f-item"><span class="f-icon">🧭</span><span class="f-text">${advice.lucky_tips.direction||'-'}</span></div>
            <div class="f-item"><span class="f-icon">⏰</span><span class="f-text">${advice.lucky_tips.time||'-'}</span></div>
            <div class="f-item"><span class="f-icon">✨</span><span class="f-text">${advice.lucky_tips.action||'-'}</span></div>
        </div>
    </div>`;
}
</script>
</body>
</html>
