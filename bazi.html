<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全息八字 - 东方玄学 OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    
    <style>

:root {
    --gold:          #D4AF37;
    --gold-light:    #E8CC80;
    --gold-dim:      rgba(212,175,55,0.15);
    --gold-border:   rgba(212,175,55,0.22);
    --bg-deep:       #05050A;
    --bg-card:       rgba(255,255,255,0.03);
    --bg-item:       rgba(255,255,255,0.025);
    --glass-border:  rgba(255,255,255,0.07);
    --text-primary:  rgba(240,237,230,0.95);
    --text-muted:    #8E8E93;
    --text-dim:      rgba(255,255,255,0.14);
    --radius-card:   22px;
    --radius-item:   12px;
    --font-serif:    'ZCOOL XiaoWei','Noto Serif SC',serif;
    --font-body:     'PingFang SC',-apple-system,sans-serif;
    --spring:        cubic-bezier(0.34,1.56,0.64,1);
    --ease:          cubic-bezier(0.4,0,0.2,1);
    --teal:          #4ECDC4;
    --crimson:       #FF5E57;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── 背景 ── */
#cosmosCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.bg-radial{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
        radial-gradient(ellipse 55% 45% at 15% 15%,rgba(107,140,255,0.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 55% at 85% 85%,rgba(212,175,55,0.05) 0%,transparent 60%),
        linear-gradient(155deg,#05050A 0%,#0E0E1F 55%,#1A1A2E 100%)}

/* ── 顶部导航 ── */
#siteHeader{
    position:fixed;top:0;left:0;right:0;z-index:300;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;
    backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);
    background:rgba(5,5,10,0.65);
    border-bottom:1px solid rgba(255,255,255,0.04);
}
.hamburger{width:38px;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border-radius:10px;transition:background .2s;-webkit-tap-highlight-color:transparent;flex-shrink:0;border:none;background:transparent}
.hamburger:active{background:rgba(255,255,255,0.06)}
.hamburger span{display:block;width:18px;height:1.5px;background:var(--text-primary);border-radius:2px;transition:all .35s var(--spring);transform-origin:center}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

.site-logo{
    font-family:'Noto Serif SC',serif;font-size:17px;letter-spacing:.15em;font-weight:500;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 12px rgba(212,175,55,0.45));
    position:relative;
}
.site-logo::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:24px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* 头像按钮 & 下拉 */
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold-border);background:rgba(212,175,55,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .3s,background .3s}
.avatar-btn:hover{border-color:var(--gold);background:rgba(212,175,55,0.15)}
.avatar-menu{
    position:absolute;top:calc(100% + 10px);right:0;
    min-width:180px;padding:8px 0;
    background:rgba(14,14,31,0.95);
    border:1px solid var(--gold-border);
    border-radius:14px;
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    box-shadow:0 12px 40px rgba(0,0,0,0.6);
    opacity:0;pointer-events:none;transform:translateY(-6px);
    transition:opacity .25s var(--ease),transform .25s var(--ease);
    z-index:400;
}
.avatar-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.avatar-email{padding:10px 16px;font-size:11px;color:var(--text-muted);letter-spacing:.03em;border-bottom:1px solid var(--glass-border);line-height:1.5;word-break:break-all}
.avatar-logout{display:block;width:100%;padding:10px 16px;font-size:13px;color:var(--gold-light);background:none;border:none;cursor:pointer;text-align:left;letter-spacing:.05em;transition:background .2s}
.avatar-logout:hover{background:rgba(212,175,55,0.08)}

/* ── 历史抽屉 ── */
.drawer-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);pointer-events:none;transition:background .4s var(--ease)}
.drawer-overlay.open{background:rgba(0,0,0,0.65);pointer-events:all}
#historyDrawer{
    position:fixed;top:0;left:0;bottom:0;width:min(82vw,310px);z-index:201;
    transform:translateX(-100%);transition:transform .5s var(--spring);
    display:flex;flex-direction:column;
    backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);
    background:rgba(14,14,31,0.88);border-right:1px solid var(--gold-border);
}
#historyDrawer.open{transform:translateX(0)}
.drawer-head{padding:64px 22px 18px;border-bottom:1px solid var(--glass-border)}
.drawer-label{font-size:10px;color:var(--text-muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:4px;font-family:var(--font-serif)}
.drawer-title-txt{font-size:20px;font-weight:300;letter-spacing:.05em}
.drawer-body{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.drawer-body::-webkit-scrollbar{display:none}
.drawer-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:14px}
.drawer-empty p{font-size:12px;color:var(--text-muted);text-align:center;line-height:1.8;font-family:var(--font-serif)}
.d-hist-item{padding:13px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);transition:background .2s}
.d-hist-item:hover{background:rgba(255,255,255,0.04)}
.d-hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-hist-dot.ji{background:var(--teal);box-shadow:0 0 6px var(--teal)}
.d-hist-dot.xiong{background:var(--crimson);box-shadow:0 0 6px var(--crimson)}
.d-hist-dot.ping{background:var(--gold);box-shadow:0 0 6px var(--gold-dim)}
.d-hist-info{flex:1;overflow:hidden}
.d-hist-q{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.d-hist-time{font-size:10px;color:var(--text-muted)}
.d-hist-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-family:var(--font-serif);flex-shrink:0;border:1px solid}
.d-hist-badge.da-ji   {color:#00D26A;background:rgba(0,210,106,0.1); border-color:rgba(0,210,106,0.25)}
.d-hist-badge.xiao-ji {color:var(--teal);background:rgba(78,205,196,0.1);border-color:rgba(78,205,196,0.25)}
.d-hist-badge.ping    {color:var(--gold-light);background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.25)}
.d-hist-badge.xiao-xiong{color:#F5A623;background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.25)}
.d-hist-badge.da-xiong  {color:var(--crimson);background:rgba(255,94,87,0.1);border-color:rgba(255,94,87,0.25)}

/* ── 页面 ── */
.page-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:76px 18px 60px}
.container{width:100%;max-width:520px}

/* ── 标语 ── */
.tagline{text-align:center;padding:20px 0 12px}
.tagline-main{font-family:var(--font-serif);font-size:13px;font-weight:300;letter-spacing:.3em;color:var(--text-muted);margin-bottom:6px}
.tagline-sub{font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,0.18)}

/* ── 通用玻璃卡片 ── */
.glass-card,.input-box{
    background:var(--bg-card);border:1px solid var(--glass-border);
    border-radius:var(--radius-card);
    backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
    box-shadow:0 4px 32px rgba(0,0,0,0.35),0 0 0 1px rgba(212,175,55,0.04),inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative;overflow:hidden;
}
.input-box{display:flex;flex-direction:column;gap:14px;padding:22px;margin-bottom:16px;animation:riseIn 1s .15s cubic-bezier(.22,1,.36,1) both}
.input-box::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:radial-gradient(circle,rgba(212,175,55,0.06) 0%,transparent 70%);pointer-events:none}
.input-box::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-border),transparent);opacity:.7}

/* ── 叩问天机 输入卡 ── */
.input-card{padding:22px}
.input-label{
    font-family:var(--font-serif);font-size:11px;letter-spacing:.2em;
    color:var(--text-muted);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
}
.input-label::before,.input-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.2),transparent)}

textarea{
    width:100%;min-height:130px;
    background:rgba(0,0,0,0.2);border:1px solid var(--glass-border);
    border-radius:var(--radius-item);padding:16px;
    color:var(--text-primary);
    font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.8;
    resize:none;outline:none;
    transition:border-color .4s,box-shadow .4s;
    caret-color:var(--gold);
}
textarea::placeholder{color:var(--text-dim);font-size:13px;font-family:'Noto Serif SC',serif}
textarea:focus{
    border-color:var(--gold-border);
    box-shadow:0 0 0 1px rgba(212,175,55,0.12),0 0 24px rgba(212,175,55,0.07),inset 0 0 20px rgba(212,175,55,0.02);
}

/* 时辰行 */
.time-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.time-display{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:7px}
.time-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.time-note{font-size:11px;color:rgba(255,255,255,0.18);font-family:var(--font-serif)}

/* ── CTA 按钮 ── */
.cta-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.cta-btn{
    width:100%;height:60px;border:none;outline:none;cursor:pointer;
    border-radius:18px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#8B6914 0%,#D4AF37 35%,#E8CC80 55%,#D4AF37 75%,#8B6914 100%);
    background-size:200% 100%;
    animation:shimmer 3s ease-in-out infinite,breathe 3s ease-in-out infinite;
    box-shadow:0 4px 20px rgba(212,175,55,0.3),0 0 40px rgba(212,175,55,0.1),inset 0 1px 0 rgba(255,255,255,0.2);
    transition:transform .2s var(--spring),box-shadow .3s;
    -webkit-tap-highlight-color:transparent;
}
.cta-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,175,55,0.45),0 0 60px rgba(212,175,55,0.15);animation-play-state:paused}
.cta-btn:active:not(:disabled){transform:translateY(0) scale(0.98)}
.cta-btn:disabled{opacity:.5;cursor:not-allowed;animation:none}
@keyframes shimmer{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}
@keyframes breathe{0%,100%{box-shadow:0 4px 20px rgba(212,175,55,0.3),0 0 40px rgba(212,175,55,0.1),inset 0 1px 0 rgba(255,255,255,0.2)}50%{box-shadow:0 4px 28px rgba(212,175,55,0.5),0 0 60px rgba(212,175,55,0.2),inset 0 1px 0 rgba(255,255,255,0.2)}}
.cta-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;height:100%}
.cta-text{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:500;color:#1a1000;letter-spacing:.15em}
.cta-hint{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:.1em;font-family:var(--font-serif)}

/* ── 登录卡片 ── */
.auth-card{display:flex;flex-direction:column;gap:14px;padding:22px;margin-bottom:16px;animation:riseIn 1s cubic-bezier(.22,1,.36,1) both}
.field-label{font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:-4px}
input[type="email"],input[type="password"]{
    width:100%;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);
    border-radius:var(--radius-item);padding:13px 16px;color:var(--text-primary);
    font-size:15px;font-family:var(--font-body);outline:none;
    transition:border-color .35s,box-shadow .35s;caret-color:var(--gold);
}
input::placeholder{color:var(--text-dim)}
input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(212,175,55,0.08)}

.auth-submit{
    width:100%;padding:15px;border:none;border-radius:var(--radius-item);
    background:linear-gradient(135deg,#E8CC80 0%,#B38B36 45%,#C9A052 100%);
    color:#0a0800;font-size:15px;font-family:var(--font-serif);font-weight:600;
    letter-spacing:4px;cursor:pointer;transition:transform .25s,box-shadow .25s,opacity .25s;
    box-shadow:0 4px 20px rgba(179,139,54,0.3);
}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(179,139,54,0.45)}
.auth-submit:active{transform:translateY(1px)}
.auth-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-switch{text-align:center;font-size:12px;color:var(--text-muted);cursor:pointer;letter-spacing:1px}
.auth-switch span{color:var(--gold);text-decoration:underline}

/* ── 通用按钮 ── */
.cancel-btn{background:transparent;color:var(--text-muted);border:1px solid rgba(255,255,255,0.12);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .25s ease}
.cancel-btn:hover{background:rgba(255,255,255,0.05);color:#FFF;border-color:rgba(255,255,255,0.25)}
.submit-btn{
    position:relative;overflow:hidden;
    background:linear-gradient(135deg,#E8CC80 0%,#B38B36 45%,#C9A052 100%);
    color:#0a0800;border:none;border-radius:var(--radius-item);
    padding:16px;font-size:15px;font-family:var(--font-serif);font-weight:600;
    letter-spacing:4px;cursor:pointer;transition:transform .25s,box-shadow .25s,opacity .25s;
    box-shadow:0 4px 20px rgba(179,139,54,0.3),inset 0 1px 0 rgba(255,255,255,0.18);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(179,139,54,0.45)}
.submit-btn:active{transform:translateY(1px)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── 八字区 ── */
.bazi-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-item);border:1px solid var(--glass-border);cursor:pointer;transition:background .3s;background:rgba(0,0,0,0.15)}
.bazi-toggle:hover{background:rgba(212,175,55,0.05);border-color:var(--gold-border)}
.bazi-toggle-text{font-size:14px;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.bz-select{display:block;width:44px;height:44px;border-radius:50%;margin:4px auto;background:rgba(212,175,55,0.12);border:1px solid var(--gold);color:#fff;text-align:center;font-size:16px;font-family:var(--font-serif);appearance:none;outline:none;text-align-last:center}
.profile-delete-btn{background:rgba(255,94,87,0.1);color:#FF5E57;border:1px solid rgba(255,94,87,0.3);border-radius:8px;padding:0 12px;cursor:pointer;transition:.2s}
.profile-delete-btn:hover{background:#FF5E57;color:#fff}
.switch{position:relative;display:inline-block;width:44px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.08);transition:.4s;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:var(--text-muted);transition:.4s;border-radius:50%}
input:checked+.slider{background:var(--gold)}
input:checked+.slider:before{transform:translateX(20px);background:#fff}
.bazi-workspace{display:none;margin-top:12px;animation:fadeInDown .4s ease}
.profile-selector{display:flex;gap:10px;margin-bottom:12px}
.profile-select{flex:1;background:rgba(0,0,0,0.35);border:1px solid var(--gold);color:#fff;padding:10px;border-radius:8px;outline:none;font-size:14px}
.add-profile-btn{background:rgba(212,175,55,0.12);color:var(--gold-light);border:1px solid var(--gold);padding:0 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.add-profile-btn:hover{background:var(--gold);color:#000}
.bazi-table-wrap{background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:12px;padding:16px;overflow-x:auto;transition:opacity .3s}
.bazi-table{width:100%;border-collapse:collapse;text-align:center}
.bazi-table th,.bazi-table td{padding:9px 4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bazi-table th{color:var(--text-muted);font-weight:500;font-size:12px}
.bazi-table tr:last-child td{border-bottom:none}
.bz-star{font-size:12px;color:var(--text-primary)}
.bz-char{font-size:22px;font-weight:600;font-family:'Noto Serif SC','STSong','Songti SC','PingFang SC',sans-serif}
.wx-jin{color:#E8CC80}.wx-mu{color:#81C784}.wx-shui{color:#64B5F6}.wx-huo{color:#E57373}.wx-tu{color:#DCE775}
.profile-form{display:none;background:rgba(255,255,255,0.02);padding:16px;border-radius:12px;border:1px dashed var(--glass-border);margin-bottom:12px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row input,.form-row select{flex:1;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid var(--glass-border);color:white}
.info-icon{display:inline-flex;justify-content:center;align-items:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--text-muted);color:var(--text-muted);font-size:11px;margin-left:8px;cursor:pointer;transition:all .2s;font-family:Arial,sans-serif;opacity:.8}
.info-icon:hover{border-color:var(--gold-light);color:var(--gold-light);opacity:1;transform:scale(1.1)}

/* ── 加载动画 (八卦 SVG) ── */
#loader{display:none;flex-direction:column;align-items:center;gap:24px;padding:32px 0 40px}
.bagua-ring-wrap{position:relative;width:120px;height:120px}
.bagua-svg{width:100%;height:100%;animation:rotateBagua 8s linear infinite}
.bagua-inner-g{animation:rotateBagua 4s linear infinite reverse;transform-origin:50% 50%}
@keyframes rotateBagua{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loader-text-block{display:flex;flex-direction:column;align-items:center;gap:8px}
.loader-main-text{font-family:var(--font-serif);font-size:13px;color:var(--gold);letter-spacing:.15em;text-align:center;line-height:2;animation:fadeTxt 2s ease-in-out infinite}
@keyframes fadeTxt{0%,100%{opacity:.4}50%{opacity:.9}}
.loader-dots{display:flex;gap:6px}
.loader-dots span{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.25;animation:dotPulse 1.2s ease-in-out infinite}
.loader-dots span:nth-child(2){animation-delay:.2s}
.loader-dots span:nth-child(3){animation-delay:.4s}

/* ── 再起一局 按钮 ── */
.reset-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;height:50px;background:transparent;
    border:1px solid var(--glass-border);border-radius:14px;
    color:var(--text-muted);font-size:13px;letter-spacing:.12em;
    cursor:pointer;transition:all .3s;
    font-family:var(--font-serif);margin-top:4px;margin-bottom:32px;
}
.reset-btn:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.14);color:var(--text-primary)}

/* ── 结果卡片 ── */
.card{
    background:var(--bg-card);border-radius:var(--radius-card);
    border:1px solid var(--glass-border);padding:24px 20px;
    display:none;margin-bottom:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.65),0 0 0 1px rgba(212,175,55,0.06);
    animation:riseIn .7s cubic-bezier(.22,1,.36,1) both;
    position:relative;overflow:hidden;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--theme-color,#B38B36),transparent);opacity:.55}
.card::after{content:'☰';position:absolute;bottom:-20px;right:-10px;font-size:110px;color:rgba(255,255,255,0.015);pointer-events:none;font-family:serif;line-height:1}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.title{font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.score-badge{display:flex;flex-direction:column;align-items:center;gap:3px}
.score{background:var(--theme-color-dim,rgba(179,139,54,0.15));color:var(--theme-color,#B38B36);padding:4px 12px;border-radius:20px;font-weight:800;font-size:18px;letter-spacing:1px;border:1px solid color-mix(in srgb,var(--theme-color,#B38B36) 30%,transparent);box-shadow:0 0 16px var(--theme-color-dim,rgba(179,139,54,0.15));animation:glowPulse 3s ease-in-out infinite}
.score-label{font-size:9px;color:var(--text-muted);letter-spacing:1px}
.verdict-badge{display:inline-flex;align-items:center;font-family:var(--font-serif);font-size:14px;padding:4px 14px;border-radius:20px;margin-bottom:6px;letter-spacing:.08em;border:1px solid}
.verdict-da-ji   {color:#00D26A;background:rgba(0,210,106,0.08);border-color:rgba(0,210,106,0.25);text-shadow:0 0 12px rgba(0,210,106,0.4)}
.verdict-xiao-ji {color:var(--teal);background:rgba(78,205,196,0.08);border-color:rgba(78,205,196,0.25);text-shadow:0 0 12px rgba(78,205,196,0.4)}
.verdict-ping    {color:var(--gold-light);background:rgba(212,175,55,0.08);border-color:rgba(212,175,55,0.25);text-shadow:0 0 12px rgba(212,175,55,0.3)}

.keyword{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);padding:4px 12px;border-radius:20px;margin-bottom:20px;letter-spacing:.5px}

.stem-sky{top:5px;left:6px;color:#DDDDE8}

.label{font-size:9px;color:var(--text-muted);display:block;margin-bottom:6px;letter-spacing:1.5px;text-transform:uppercase}
.value{font-size:13px;font-weight:400;color:#DDDDE5;line-height:1.65}

.footer{display:flex;gap:8px;background:linear-gradient(135deg,rgba(212,175,55,0.08),rgba(212,175,55,0.04));border:1px solid var(--gold-border);padding:14px 10px;border-radius:14px;margin-top:24px}

    <script>
        // ==========================================
        // 1. 初始化 Supabase 与全局常量
        // ==========================================
        const SUPABASE_URL = 'https://xkbqiiwwgfzkyfhxuoev.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qr9YBIA6n32r-mcqKbkpgA_0XVTUSI7';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let baziProfiles = [];
    
        // 八字所需的常量字典
        const TIAN_GAN = "甲乙丙丁戊己庚辛壬癸".split("");
        const DI_ZHI = "子丑寅卯辰巳午未申酉戌亥".split("");
        const WX_MAP = {'甲':'wx-mu','乙':'wx-mu','寅':'wx-mu','卯':'wx-mu','丙':'wx-huo','丁':'wx-huo','巳':'wx-huo','午':'wx-huo','戊':'wx-tu','己':'wx-tu','辰':'wx-tu','戌':'wx-tu','丑':'wx-tu','未':'wx-tu','庚':'wx-jin','辛':'wx-jin','申':'wx-jin','酉':'wx-jin','壬':'wx-shui','癸':'wx-shui','亥':'wx-shui','子':'wx-shui'};
        const SHI_SHEN_MAP = {'甲':{'甲':'比肩','乙':'劫财','丙':'食神','丁':'伤官','戊':'偏财','己':'正财','庚':'七杀','辛':'正官','壬':'偏印','癸':'正印'},'乙':{'甲':'劫财','乙':'比肩','丙':'伤官','丁':'食神','戊':'正财','己':'偏财','庚':'正官','辛':'七杀','壬':'正印','癸':'偏印'},'丙':{'甲':'偏印','乙':'正印','丙':'比肩','丁':'劫财','戊':'食神','己':'伤官','庚':'偏财','辛':'正财','壬':'七杀','癸':'正官'},'丁':{'甲':'正印','乙':'偏印','丙':'劫财','丁':'比肩','戊':'伤官','己':'食神','庚':'正财','辛':'偏财','壬':'正官','癸':'七杀'},'戊':{'甲':'七杀','乙':'正官','丙':'偏印','丁':'正印','戊':'比肩','己':'劫财','庚':'食神','辛':'伤官','壬':'偏财','癸':'正财'},'己':{'甲':'正官','乙':'七杀','丙':'正印','丁':'偏印','戊':'劫财','己':'比肩','庚':'伤官','辛':'食神','壬':'正财','癸':'偏财'},'庚':{'甲':'偏财','乙':'正财','丙':'七杀','丁':'正官','戊':'偏印','己':'正印','庚':'比肩','辛':'劫财','壬':'食神','癸':'伤官'},'辛':{'甲':'正财','乙':'偏财','丙':'正官','丁':'七杀','戊':'正印','己':'偏印','庚':'劫财','辛':'比肩','壬':'伤官','癸':'食神'},'壬':{'甲':'食神','乙':'伤官','丙':'偏财','丁':'正财','戊':'七杀','己':'正官','庚':'偏印','辛':'正印','壬':'比肩','癸':'劫财'},'癸':{'甲':'伤官','乙':'食神','丙':'正财','丁':'偏财','戊':'正官','己':'七杀','庚':'正印','辛':'偏印','壬':'劫财','癸':'比肩'}};

        window.onload = async () => {
            // 渲染背景
            initVisuals();

            const { data: { session }, error } = await _supabase.auth.getSession();

                // 如果没登录，直接踢回奇门主页去登录

                return;

            // 登录成功，放行并拉取八字档案

            fetchBaziProfiles();
        };
    
        // ==========================================
        // 3. 八字专属业务逻辑 (简化版)
        // ==========================================
        async function fetchBaziProfiles() {
            if(!currentUser) return;
            const { data, error } = await _supabase.from('bazi_profiles').select('*').order('created_at', {ascending: false});
            if(error || !data || data.length === 0) {
                // 这里可以处理空状态
                console.log("暂无档案");
                return;
            }
            baziProfiles = data;
            
            // 下一步：我们在这里把 data 传给你准备写的 Joey Yap 风格渲染函数
            // renderJoeyYapDashboard(baziProfiles[0]); 
        }
    
        // ==========================================
        // 4. 星空背景动画
        // ==========================================
        function initVisuals() {
            const canvas = document.getElementById('cosmosCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W, H, stars = [];
            function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
            function initStars(){
                stars = []; const count = Math.floor((W*H)/5000);
                for(let i=0; i<count; i++) stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*0.9+0.2, a:Math.random(), speed:(Math.random()*0.3+0.05)*(Math.random()>.5?1:-1), drift:(Math.random()-.5)*0.1});
            }
            function draw(){
                ctx.clearRect(0,0,W,H);
                stars.forEach(s=>{
                    s.a += s.speed*0.008; s.x += s.drift;
                    if(s.x < 0) s.x = W; if(s.x > W) s.x = 0;
                    ctx.save(); ctx.globalAlpha = ((Math.sin(s.a)+1)/2)*0.5+0.05;
                    ctx.fillStyle = '#E8CC80'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                });
                requestAnimationFrame(draw);
            }
            resize(); initStars(); draw();
            window.addEventListener('resize', ()=>{ resize(); initStars(); });
        }
    </script>
</body>
