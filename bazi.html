<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全息八字 - 东方玄学 OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    
    <style>
        /* ==========================================================================
           1. 全局核心变量与基础重置
        ========================================================================== */
        :root {
            --gold: #D4AF37; --gold-light: #E8CC80; --gold-dim: rgba(212,175,55,0.15);
            --gold-border: rgba(212,175,55,0.22); --bg-deep: #05050A; --bg-card: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.07); --text-primary: rgba(240,237,230,0.95);
            --text-muted: #8E8E93; --radius-card: 22px; --radius-item: 12px;
            --font-serif: 'ZCOOL XiaoWei','Noto Serif SC',serif;
            --font-body: 'PingFang SC',-apple-system,sans-serif;
            --teal: #4ECDC4; --crimson: #FF5E57;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{min-height:100%;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}
        body { padding-bottom: 90px !important; }

        #cosmosCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .bg-radial{position:fixed;inset:0;z-index:0;pointer-events:none;
            background: radial-gradient(ellipse 55% 45% at 15% 15%,rgba(107,140,255,0.06) 0%,transparent 60%),
                        radial-gradient(ellipse 50% 55% at 85% 85%,rgba(212,175,55,0.05) 0%,transparent 60%),
                        linear-gradient(155deg,#05050A 0%,#0E0E1F 55%,#1A1A2E 100%)}

        #siteHeader{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:14px 20px;height:60px;backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);background:rgba(5,5,10,0.65);border-bottom:1px solid rgba(255,255,255,0.04)}
        .site-logo{font-family:'Noto Serif SC',serif;font-size:17px;letter-spacing:.15em;font-weight:500;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(212,175,55,0.45))}

        #globalBottomNav {position:fixed;bottom:0;left:0;right:0;z-index:9999;height:calc(65px + env(safe-area-inset-bottom));background:rgba(14,14,31,0.88);backdrop-filter:blur(40px);border-top:1px solid rgba(212,175,55,0.22);display:flex;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}
        .nav-item {flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:#8E8E93;cursor:pointer;text-decoration:none;transition:all 0.3s}
        .nav-item.active {color:#D4AF37}
        .nav-icon {font-size:22px}
        .nav-label {font-size:10px;font-weight:600;letter-spacing:1px}

        .page-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:76px 18px 60px}
        .container{width:100%;max-width:520px}
        .glass-card {background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius-card);padding:20px;margin-bottom:16px;backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);box-shadow:0 4px 32px rgba(0,0,0,0.35);animation:riseIn 0.5s ease both}
        @keyframes riseIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

        .profile-selector{display:flex;gap:10px;margin-bottom:16px}
        .profile-select{flex:1;background:rgba(0,0,0,0.35);border:1px solid var(--gold);color:#fff;padding:10px;border-radius:8px;outline:none;font-size:14px}
        .btn-ghost {background:rgba(212,175,55,0.12);color:var(--gold-light);border:1px solid var(--gold);padding:0 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap;}
        .btn-ghost:hover {background:var(--gold);color:#000}
        .btn-danger {background:rgba(255,94,87,0.1);color:#FF5E57;border:1px solid rgba(255,94,87,0.3);border-radius:8px;padding:0 12px;cursor:pointer}
        .btn-primary {background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#000;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-family:var(--font-serif);box-shadow:0 2px 10px rgba(212,175,55,0.3); transition: transform 0.2s; white-space:nowrap;}
        .btn-primary:active {transform: scale(0.95);}

        .profile-form{display:none;background:rgba(255,255,255,0.02);padding:16px;border-radius:12px;border:1px dashed var(--glass-border);margin-bottom:16px}
        .form-row{display:flex;gap:12px;margin-bottom:12px}
        .form-row input, .form-row select{flex:1;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid var(--glass-border);color:white;outline:none;font-family:var(--font-body);}

        /* ==========================================================================
           2. 八字主看板 & 表格 UI
        ========================================================================== */
        .bazi-header {display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--glass-border);padding-bottom:16px;margin-bottom:16px}
        .name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;}
        .bazi-name {font-family:var(--font-serif);font-size:22px;color:var(--gold-light);letter-spacing:2px; font-weight:bold;}
        .bazi-meta {font-size:11px;color:var(--text-muted);line-height:1.6;margin-top:2px}
        
        /* 尊贵标签体系 */
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: var(--font-body); letter-spacing: 1px; font-weight: 500;}
        .badge-gold { background: rgba(212,175,55,0.15); color: var(--gold-light); border: 1px solid rgba(212,175,55,0.3); }
        .badge-blue { background: rgba(78, 205, 196, 0.15); color: #4ECDC4; border: 1px solid rgba(78, 205, 196, 0.3); }
        .pattern-tag { font-size: 10px; color: #E8CC80; background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2); padding: 2px 6px; border-radius: 4px; display:inline-block; margin-right:4px; margin-top:4px;}
        
        .tabs {display:flex;gap:20px;margin-bottom:16px}
        .tab {font-size:14px;color:var(--text-muted);cursor:pointer;padding-bottom:6px;border-bottom:2px solid transparent;transition:all 0.3s}
        .tab.active {color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

        .bazi-table-wrap {overflow-x:auto;scrollbar-width:none}
        .bazi-table {width:100%;border-collapse:collapse;text-align:center;min-width:360px}
        .bazi-table th, .bazi-table td {padding:10px 4px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:top}
        .bz-label, .bazi-table th {color:var(--text-muted);font-weight:500;font-size:12px; vertical-align: middle;}
        
        .bz-star {font-size:12px;color:var(--text-primary)}
        .bz-char {font-size:24px;font-weight:600;font-family:'Noto Serif SC',serif;margin:4px 0}
        .bz-sub {font-size:11px;color:#aaa;line-height:1.6}
        .bz-shensha {font-size:10px; color:#B39DDB; line-height:1.6;}
        
        /* 五行色 */
        .wx-jin{color:#E8CC80} .wx-mu{color:#81C784} .wx-shui{color:#64B5F6} .wx-huo{color:#E57373} .wx-tu{color:#DCE775}
        
        /* 大运轴 */
        .timeline-section {margin-top:20px;border-top:1px dashed var(--glass-border);padding-top:16px}
        .timeline-title {font-size:12px;color:var(--gold);margin-bottom:12px;font-family:var(--font-serif)}
        .dayun-grid {display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
        .dayun-item {background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:10px;min-width:64px;text-align:center;flex-shrink:0}
        .dayun-item.active {border-color:var(--gold);background:rgba(212,175,55,0.1)}
        .dy-age {font-size:10px;color:var(--text-muted);margin-bottom:4px}
        .dy-char {font-size:16px;font-family:'Noto Serif SC',serif;font-weight:600}

        /* ==========================================================================
           3. 结构化 AI 断语 UI
        ========================================================================== */
        .ai-section { margin-top: 20px; display: none; animation: riseIn 0.5s ease both;}
        .ai-header-title { font-family: var(--font-serif); color: var(--gold); font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;}
        .ai-header-title::before { content: '✧'; font-size: 14px;}
        
        .xiji-box { display: flex; gap: 10px; margin-bottom: 16px; }
        .xiji-item { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; text-align: center;}
        .xiji-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px;}
        .xiji-val { font-weight: 500; font-size: 14px;}
        .xiji-val.favorable { color: #81C784; }
        .xiji-val.unfavorable { color: #E57373; }

        .insight-card { background: linear-gradient(180deg, rgba(212,175,55,0.05) 0%, rgba(0,0,0,0) 100%); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; margin-bottom: 12px;}
        .insight-card h4 { color: var(--gold-light); font-size: 13px; margin-bottom: 8px; font-family: var(--font-serif); border-bottom: 1px dashed rgba(212,175,55,0.2); padding-bottom: 6px;}
        .insight-card p { font-size: 13px; color: #D0D0D8; line-height: 1.8; white-space: pre-wrap;}
        
        .legacy-summary { background: rgba(212,175,55,0.05); border: 1px solid var(--gold-border); border-radius: 12px; padding: 16px; font-size: 13px; color: #D0D0D8; line-height: 1.8; white-space: pre-wrap; display: none; margin-top:20px;}
    </style>
</head>
<body>
    <canvas id="cosmosCanvas"></canvas>
    <div class="bg-radial"></div>

    <header id="siteHeader">
        <div class="site-logo">全息八字</div>
    </header>

    <div class="page-wrap">
        <div class="container">
            <div class="glass-card">
                <div class="profile-selector">
                    <select id="profileSelect" class="profile-select" onchange="renderDashboard()">
                        <option value="">正在加载档案...</option>
                    </select>
                    <button class="btn-ghost" onclick="showAddForm()">+ 新增</button>
                    <button class="btn-danger" onclick="deleteProfile()">删除</button>
                </div>

                <div id="profileForm" class="profile-form">
                    <div class="form-row">
                        <input type="text" id="pName" placeholder="命主姓名">
                        <select id="pGender"><option value="M">男 (乾造)</option><option value="F">女 (坤造)</option></select>
                    </div>
                    <div class="form-row">
                        <input type="datetime-local" id="pBirth" style="color-scheme:dark;">
                    </div>
                    <div style="display:flex;justify-content:flex-end;gap:8px;">
                        <button class="btn-ghost" style="border:none;color:var(--text-muted)" onclick="hideAddForm()">取消</button>
                        <button class="btn-ghost" onclick="saveProfile()">保存档案</button>
                    </div>
                </div>
            </div>

            <div class="glass-card" id="dashboardPanel" style="display: none;">
                
                <div class="bazi-header">
                    <div>
                        <div class="name-row">
                            <span class="bazi-name" id="bName">---</span>
                            <span class="badge badge-gold" id="badgeGeju" style="display: none;"></span>
                            <span class="badge badge-blue" id="badgeStrongWeak" style="display: none;"></span>
                        </div>
                        <div class="bazi-meta" id="bLunarDate">农历加载中...</div>
                        <div class="bazi-meta" id="bSolarDate">阳历加载中...</div>
                        <div id="specialPatternsBox" style="display:none; margin-top:6px;"></div>
                    </div>
                    <button class="btn-primary" id="btnAnalyze" onclick="requestAiSummary()">推演天机</button>
                </div>

                <div class="tabs">
                    <div class="tab active" id="tabBasic" onclick="switchTab('basic')">基础排盘</div>
                    <div class="tab" id="tabPro" onclick="switchTab('pro')">专业细盘</div>
                </div>

                <div class="bazi-table-wrap">
                    <table class="bazi-table" id="baziTable"></table>
                </div>

                <div id="timelineSection" class="timeline-section" style="display: none;">
                    <div class="timeline-title">大运排盘</div>
                    <div class="dayun-grid" id="dayunGrid"></div>
                </div>

                <div id="aiAnalysisSection" class="ai-section">
                    <div class="ai-header-title">天机锦囊</div>
                    
                    <div class="xiji-box">
                        <div class="xiji-item">
                            <div class="xiji-label">喜用神</div>
                            <div class="xiji-val favorable" id="yongShen">-</div>
                        </div>
                        <div class="xiji-item">
                            <div class="xiji-label">忌仇神</div>
                            <div class="xiji-val unfavorable" id="jiShen">-</div>
                        </div>
                    </div>

                    <div class="insight-card">
                        <h4>原局核心</h4>
                        <p id="yuanjuText">-</p>
                    </div>
                    <div class="insight-card">
                        <h4>岁运推演</h4>
                        <p id="dayunText" style="margin-bottom: 8px;"></p>
                        <p id="liunianText"></p>
                    </div>
                </div>

                <div id="legacySummary" class="legacy-summary"></div>

            </div>
        </div>
    </div>

    <nav id="globalBottomNav">
        <a href="index.html" class="nav-item"><div class="nav-icon">🧭</div><div class="nav-label">奇门</div></a>
        <a href="bazi.html" class="nav-item active"><div class="nav-icon">🧬</div><div class="nav-label">八字</div></a>
        <a href="me.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">我的</div></a>
    </nav>

    <script>
        // ==========================================
        // 初始化配置
        // ==========================================
        const SUPABASE_URL = 'https://xkbqiiwwgfzkyfhxuoev.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qr9YBIA6n32r-mcqKbkpgA_0XVTUSI7';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null, baziProfiles = [], currentTab = 'basic';
        const WX_MAP={'甲':'wx-mu','乙':'wx-mu','寅':'wx-mu','卯':'wx-mu','丙':'wx-huo','丁':'wx-huo','巳':'wx-huo','午':'wx-huo','戊':'wx-tu','己':'wx-tu','辰':'wx-tu','戌':'wx-tu','丑':'wx-tu','未':'wx-tu','庚':'wx-jin','辛':'wx-jin','申':'wx-jin','酉':'wx-jin','壬':'wx-shui','癸':'wx-shui','亥':'wx-shui','子':'wx-shui'};

        // 核心防崩基建：本地纳音、藏干、十二长生字典
        const NAYIN = {"甲子":"海中金","乙丑":"海中金","丙寅":"炉中火","丁卯":"炉中火","戊辰":"大林木","己巳":"大林木","庚午":"路旁土","辛未":"路旁土","壬申":"剑锋金","癸酉":"剑锋金","甲戌":"山头火","乙亥":"山头火","丙子":"涧下水","丁丑":"涧下水","戊寅":"城头土","己卯":"城头土","庚辰":"白蜡金","辛巳":"白蜡金","壬午":"杨柳木","癸未":"杨柳木","甲申":"泉中水","乙酉":"泉中水","丙戌":"屋上土","丁亥":"屋上土","戊子":"霹雳火","己丑":"霹雳火","庚寅":"松柏木","辛卯":"松柏木","壬辰":"长流水","癸巳":"长流水","甲午":"沙中金","乙未":"沙中金","丙申":"山下火","丁酉":"山下火","戊戌":"平地木","己亥":"平地木","庚子":"壁上土","辛丑":"壁上土","壬寅":"金箔金","癸卯":"金箔金","甲辰":"覆灯火","乙巳":"覆灯火","丙午":"天河水","丁未":"天河水","戊申":"大驿土","己酉":"大驿土","庚戌":"钗钏金","辛亥":"钗钏金","壬子":"桑柘木","癸丑":"桑柘木","甲寅":"大溪水","乙卯":"大溪水","丙辰":"沙中土","丁巳":"沙中土","戊午":"天上火","己未":"天上火","庚申":"石榴木","辛酉":"石榴木","壬戌":"大海水","癸亥":"大海水"};
        const ZHI_HIDE = {"子":["癸"],"丑":["己","癸","辛"],"寅":["甲","丙","戊"],"卯":["乙"],"辰":["戊","乙","癸"],"巳":["丙","庚","戊"],"午":["丁","己"],"未":["己","丁","乙"],"申":["庚","壬","戊"],"酉":["辛"],"戌":["戊","辛","丁"],"亥":["壬","甲"]};
        const SHI_ER = ["长生","沐浴","冠带","临官","帝旺","衰","病","死","墓","绝","胎","养"];
        const CHANG_SHENG_START = { "甲":11, "丙":2, "戊":2, "庚":5, "壬":8, "乙":6, "丁":9, "己":9, "辛":0, "癸":3 };
        const ZHI_INDEX = {"子":0,"丑":1,"寅":2,"卯":3,"辰":4,"巳":5,"午":6,"未":7,"申":8,"酉":9,"戌":10,"亥":11};
        
        function getDiShi(gan, zhi) {
            if(!gan || !zhi || CHANG_SHENG_START[gan] === undefined || ZHI_INDEX[zhi] === undefined) return '-';
            let start = CHANG_SHENG_START[gan];
            let zIndex = ZHI_INDEX[zhi];
            let isYang = ["甲","丙","戊","庚","壬"].includes(gan);
            let offset = isYang ? (zIndex - start + 12) % 12 : (start - zIndex + 12) % 12;
            return SHI_ER[offset];
        }

        window.onload = async () => {
            initVisuals();
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return window.location.href = 'index.html';
            currentUser = session.user;
            await fetchProfiles();
        };

        async function fetchProfiles() {
            const { data } = await _supabase.from('bazi_profiles').select('*').order('created_at', {ascending: false});
            baziProfiles = data || [];
            const select = document.getElementById('profileSelect');
            if (baziProfiles.length > 0) {
                // 保持选中项不变
                const curVal = select.value;
                select.innerHTML = baziProfiles.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                if (curVal && baziProfiles.some(p => p.id === curVal)) select.value = curVal;
                renderDashboard();
            } else {
                select.innerHTML = '<option value="">请先新增档案</option>';
                document.getElementById('dashboardPanel').style.display = 'none';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabBasic').classList.toggle('active', tab === 'basic');
            document.getElementById('tabPro').classList.toggle('active', tab === 'pro');
            renderDashboard();
        }

function generateLunarPromptData(profile) {
            let res = { gender: profile.gender === 'M' ? '男' : '女', birthStr: "", baziStr: "", daYunStr: "当前大运" };
            if (profile.birth_date) {
                const p = profile.birth_date.match(/\d+/g);
                if (p && p.length >= 3) {
                    // 增加容错：如果缺失时分，默认补 12:00
                    const hour = p[3] || '12';
                    const minute = p[4] || '00';
                    res.birthStr = `${p[0]}年${p[1]}月${p[2]}日 ${hour}:${minute}`;
                    
                    const b = window.Solar.fromYmdHms(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]), parseInt(hour), parseInt(minute), 0).getLunar().getEightChar();
                    res.baziStr = `${b.getYear()} ${b.getMonth()} ${b.getDay()} ${b.getTime()}`;
                }
            }
            return res;
        }

        // ==========================================
        // 渲染核心看板
        // ==========================================
        function renderDashboard() {
            try {
                const profile = baziProfiles.find(p => p.id === document.getElementById('profileSelect').value);
                if (!profile) return;

                document.getElementById('dashboardPanel').style.display = 'block';
                
                const formatted = generateLunarPromptData(profile);
                const p = formatted.birthStr.match(/\d+/g);
                if (!p) return;

                const solar = window.Solar.fromYmdHms(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]), parseInt(p[3]||0), parseInt(p[4]||0), 0);
                const lunar = solar.getLunar();
                const bazi = lunar.getEightChar();
                const genderCode = profile.gender === 'M' ? 1 : 0;
                const yun = bazi.getYun(genderCode);
                const dayGan = bazi.getDayGan(), xunKong = bazi.getDayXunKong();

                // 1. 头部信息渲染
                document.getElementById('bName').innerText = profile.name;
                document.getElementById('bSolarDate').innerText = `阳历：${solar.toYmdHms()}`;
                document.getElementById('bLunarDate').innerText = `农历：${lunar.getYearInGanZhi()}年${lunar.getMonthInChinese()}月${lunar.getDayInChinese()} ${lunar.getTimeZhi()}时 ${profile.gender==='M'?'乾造':'坤造'}`;

                // 2. 尊贵 Badge 徽标与特殊命局渲染
                const badgeGeju = document.getElementById('badgeGeju');
                const badgeStrongWeak = document.getElementById('badgeStrongWeak');
                const specialBox = document.getElementById('specialPatternsBox');
                
                if (profile.geju) { badgeGeju.innerText = profile.geju; badgeGeju.style.display = 'inline-block'; } else { badgeGeju.style.display = 'none'; }
                if (profile.strong_weak) { badgeStrongWeak.innerText = profile.strong_weak; badgeStrongWeak.style.display = 'inline-block'; } else { badgeStrongWeak.style.display = 'none'; }

                let patternsHtml = '';
                if (profile.bazi_detail && profile.bazi_detail.base_info && profile.bazi_detail.base_info.special_patterns) {
                    const sp = profile.bazi_detail.base_info.special_patterns;
                    if (sp.length > 0) {
                        patternsHtml = sp.map(s => `<span class="pattern-tag">${s.split('】')[0] + '】'}</span>`).join('');
                    }
                }
                if(patternsHtml) { specialBox.innerHTML = patternsHtml; specialBox.style.display = 'block'; } else { specialBox.style.display = 'none'; }


                // 3. 提取神煞 (兼容对象和字符串格式)
                let ss = {};
                if (profile.shensha) {
                    ss = typeof profile.shensha === 'string' ? JSON.parse(profile.shensha) : profile.shensha;
                }

                // 4. 构建表格列
                const pillars = [
                    { k: '年', g: bazi.getYearGan(), z: bazi.getYearZhi(), s: bazi.getYearShiShenGan(), h: ZHI_HIDE[bazi.getYearZhi()]||[], shi: bazi.getYearDiShi(), zizuo: getDiShi(bazi.getYearGan(), bazi.getYearZhi()), n: NAYIN[bazi.getYearGan()+bazi.getYearZhi()]||'-', x: xunKong.includes(bazi.getYearZhi()) ? '空' : '', shen: ss.year || '-' },
                    { k: '月', g: bazi.getMonthGan(), z: bazi.getMonthZhi(), s: bazi.getMonthShiShenGan(), h: ZHI_HIDE[bazi.getMonthZhi()]||[], shi: bazi.getMonthDiShi(), zizuo: getDiShi(bazi.getMonthGan(), bazi.getMonthZhi()), n: NAYIN[bazi.getMonthGan()+bazi.getMonthZhi()]||'-', x: xunKong.includes(bazi.getMonthZhi()) ? '空' : '', shen: ss.month || '-' },
                    { k: '日', g: bazi.getDayGan(), z: bazi.getDayZhi(), s: profile.gender==='M'?'元男':'元女', h: ZHI_HIDE[bazi.getDayZhi()]||[], shi: bazi.getDayDiShi(), zizuo: getDiShi(bazi.getDayGan(), bazi.getDayZhi()), n: NAYIN[bazi.getDayGan()+bazi.getDayZhi()]||'-', x: xunKong.includes(bazi.getDayZhi()) ? '空' : '', shen: ss.day || '-' },
                    { k: '时', g: bazi.getTimeGan(), z: bazi.getTimeZhi(), s: bazi.getTimeShiShenGan(), h: ZHI_HIDE[bazi.getTimeZhi()]||[], shi: bazi.getTimeDiShi(), zizuo: getDiShi(bazi.getTimeGan(), bazi.getTimeZhi()), n: NAYIN[bazi.getTimeGan()+bazi.getTimeZhi()]||'-', x: xunKong.includes(bazi.getTimeZhi()) ? '空' : '', shen: ss.time || '-' }
                ];

                let columns = [];
                if (currentTab === 'basic') {
                    document.getElementById('timelineSection').style.display = 'none';
                    columns = pillars;
                } else {
                    document.getElementById('timelineSection').style.display = 'block';
                    const curYear = new Date().getFullYear();
                    const dy = yun.getDaYun().find(d => curYear >= d.getStartYear() && curYear <= d.getEndYear()) || yun.getDaYun()[0];
                    const ln = dy.getLiuNian().find(l => l.getYear() === curYear);
                    
                    const dyG = dy.getGanZhi()[0], dyZ = dy.getGanZhi()[1];
                    const lnG = ln.getGanZhi()[0], lnZ = ln.getGanZhi()[1];

                    columns = [
                        { k: '流年', g: lnG, z: lnZ, s: '流年', h: ZHI_HIDE[lnZ]||[], shi: getDiShi(dayGan, lnZ), zizuo: getDiShi(lnG, lnZ), n: NAYIN[lnG+lnZ]||'-', x: xunKong.includes(lnZ) ? '空' : '', shen: '-' },
                        { k: '大运', g: dyG, z: dyZ, s: '大运', h: ZHI_HIDE[dyZ]||[], shi: getDiShi(dayGan, dyZ), zizuo: getDiShi(dyG, dyZ), n: NAYIN[dyG+dyZ]||'-', x: xunKong.includes(dyZ) ? '空' : '', shen: '-' },
                        ...pillars
                    ];

                    document.getElementById('dayunGrid').innerHTML = yun.getDaYun().slice(0,10).map(d => `
                    <div class="dayun-item ${d.getGanZhi()===dy.getGanZhi()?'active':''}">
                        <div class="dy-age">${d.getStartYear()}年<br>${d.getStartAge()}岁</div>
                        <div class="dy-char ${WX_MAP[d.getGanZhi()[0]]}">${d.getGanZhi()[0]}</div>
                        <div class="dy-char ${WX_MAP[d.getGanZhi()[1]]}">${d.getGanZhi()[1]}</div>
                    </div>`).join('');
                }

                // 绘制表格 (神煞列处理为换行)
                document.getElementById('baziTable').innerHTML = `<thead><tr><th class="bz-label">柱位</th>${columns.map(x=>`<th class="bz-label">${x.k}${currentTab==='basic'?'柱':''}</th>`).join('')}</tr></thead><tbody>
                    <tr><td class="bz-label">主星</td>${columns.map(x=>`<td class="bz-star">${x.s}</td>`).join('')}</tr>
                    <tr><td class="bz-label">天干</td>${columns.map(x=>`<td class="bz-char ${WX_MAP[x.g]||''}">${x.g}</td>`).join('')}</tr>
                    <tr><td class="bz-label">地支</td>${columns.map(x=>`<td class="bz-char ${WX_MAP[x.z]||''}">${x.z}</td>`).join('')}</tr>
                    <tr><td class="bz-label">藏干</td>${columns.map(x=>`<td class="bz-sub">${x.h.map(gan => `<span class="${WX_MAP[gan]}">${gan}</span>`).join('<br>')}</td>`).join('')}</tr>
                    <tr><td class="bz-label">星运</td>${columns.map(x=>`<td class="bz-sub">${x.shi}</td>`).join('')}</tr>
                    <tr><td class="bz-label">自座</td>${columns.map(x=>`<td class="bz-sub">${x.zizuo}</td>`).join('')}</tr>
                    <tr><td class="bz-label">空亡</td>${columns.map(x=>`<td class="bz-sub" style="color:var(--crimson)">${x.x}</td>`).join('')}</tr>
                    <tr><td class="bz-label">纳音</td>${columns.map(x=>`<td class="bz-sub">${x.n}</td>`).join('')}</tr>
                    <tr><td class="bz-label">神煞</td>${columns.map(x=>`<td class="bz-shensha">${x.shen.replace(/ /g, '<br>')}</td>`).join('')}</tr>
                </tbody>`;
                
                // 5. 渲染 AI 结构化断语
                const aiSec = document.getElementById('aiAnalysisSection');
                const legSec = document.getElementById('legacySummary');
                
                if (profile.yuanju_core) {
                    aiSec.style.display = 'block';
                    legSec.style.display = 'none';
                    
                    document.getElementById('yongShen').innerText = profile.favorable_elements || '-';
                    document.getElementById('jiShen').innerText = profile.unfavorable_elements || '-';
                    document.getElementById('yuanjuText').innerText = profile.yuanju_core;
                    document.getElementById('dayunText').innerHTML = `<strong style="color:var(--gold)">【大运】</strong> ${profile.current_dayun}`;
                    document.getElementById('liunianText').innerHTML = `<strong style="color:var(--gold)">【流年】</strong> ${profile.current_liunian}`;
                } else if (profile.bazi_summary) {
                    aiSec.style.display = 'none';
                    legSec.style.display = 'block';
                    legSec.innerText = profile.bazi_summary;
                } else {
                    aiSec.style.display = 'none';
                    legSec.style.display = 'none';
                }
            } catch (e) {
                console.error("渲染遇到错误:", e);
                alert("渲染排盘表格时遇到问题，请刷新重试！");
            }
        }

        // ==========================================
        // 触发 AI 分析
        // ==========================================
        async function requestAiSummary() {
            const select = document.getElementById('profileSelect');
            const profile = baziProfiles.find(p => p.id === select.value);
            if (!profile) return;

            const btn = document.getElementById('btnAnalyze');
            const originText = btn.innerText;
            btn.innerText = "推演中..."; btn.disabled = true;

            try {
                const formatted = generateLunarPromptData(profile);
                const { data: { session } } = await _supabase.auth.getSession();

                const response = await fetch('/api/bazi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                    body: JSON.stringify({ 
                        promptData: {
                            profileId: profile.id,
                            gender: formatted.gender,
                            birthStr: formatted.birthStr,
                            baziStr: formatted.baziStr,
                            daYunStr: "当前大运" 
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                await fetchProfiles(); // 重新拉取新写入的结构化数据
                alert("天机推演完成！");

            } catch (err) {
                alert("推演失败: " + err.message);
            } finally {
                btn.innerText = originText; btn.disabled = false;
            }
        }

        // ==========================================
        // 档案增删
        // ==========================================
        function showAddForm() { document.getElementById('profileForm').style.display = 'block'; }
        function hideAddForm() { document.getElementById('profileForm').style.display = 'none'; }
        async function saveProfile() {
            const name = document.getElementById('pName').value, gender = document.getElementById('pGender').value, birth = document.getElementById('pBirth').value;
            if(!name || !birth) return alert("信息不全");
            const { error } = await _supabase.from('bazi_profiles').insert([{ user_id: currentUser.id, name, gender, birth_date: birth.replace('T',' ')+':00' }]);
            if (error) alert(error.message); else { hideAddForm(); await fetchProfiles(); }
        }
        async function deleteProfile() {
            const id = document.getElementById('profileSelect').value;
            if (id && confirm("删除档案？")) { await _supabase.from('bazi_profiles').delete().eq('id', id); await fetchProfiles(); }
        }

        function initVisuals() {
            const canvas = document.getElementById('cosmosCanvas'), ctx = canvas.getContext('2d');
            let W, H, stars = [];
            function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
            function draw(){
                ctx.clearRect(0,0,W,H);
                stars.forEach(s=>{
                    s.a += s.speed*0.008; s.x += s.drift; if(s.x < 0) s.x = W; if(s.x > W) s.x = 0;
                    ctx.save(); ctx.globalAlpha = ((Math.sin(s.a)+1)/2)*0.5+0.05;
                    ctx.fillStyle = '#E8CC80'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                });
                requestAnimationFrame(draw);
            }
            resize(); 
            stars = Array.from({length: 100}, () => ({x:Math.random()*W, y:Math.random()*H, r:Math.random()*0.8+0.2, a:Math.random(), speed:Math.random()*0.3, drift:Math.random()-0.5}));
            draw(); window.addEventListener('resize', resize);
        }
    </script>
